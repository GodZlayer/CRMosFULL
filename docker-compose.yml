services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: brasil-express-crm-frontend:local
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  webstore:
    build:
      context: .
      dockerfile: Dockerfile.webstore
    image: brasil-express-crm-webstore:local
    ports:
      - "3002:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: brasil-express-crm-server:local
    environment:
      PORT: "3000"
      CRM_STORAGE_ROOT: /app/server/storage
      CRM_AUTO_MYSQL_BACKUP_ENABLED: "0"
      DATABASE_URL: postgresql://crm:crm@postgres:5432/crmosfull
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: crmosfull
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      GMAIL_ACCESS_TOKEN: ${GMAIL_ACCESS_TOKEN:-}
      GMAIL_FROM: ${GMAIL_FROM:-}
      BRASILEXPRESS_CONTACT_EMAIL: ${BRASILEXPRESS_CONTACT_EMAIL:-}
    volumes:
      - crm-storage:/app/server/storage
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crmosfull
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crmosfull"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  crm-storage:
  postgres-data:
